name: Build Resume

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Debug file structure
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== Fonts directory ==="
          ls -la fonts/ || echo "fonts directory not found"

      - name: Clean auxiliary files
        run: rm -f *.aux *.log *.out *.toc *.fls *.fdb_latexmk *.xdv

      # 修改这里：不使用 latex-action，直接运行 docker
      - name: Compile with XeLaTeX directly
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/xu-cheng/texlive-full:latest \
            xelatex -interaction=nonstopmode -halt-on-error CV.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: CV-PDF
          path: CV.pdf
          if-no-files-found: error
